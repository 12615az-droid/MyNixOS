# =========================
# Hyprland — Purple Future Minimal for Popov
# =========================

monitor=,preferred,auto,1

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$browser = firefox
$menu = rofi -show drun -theme ~/.config/rofi/purple-neon.rasi
$runMenu = rofi -show run -theme ~/.config/rofi/purple-neon.rasi
$windowMenu = rofi -show window -theme ~/.config/rofi/purple-neon.rasi

# Autostart
exec-once = waybar
exec-once = mako
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Wayland / apps
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GDK_BACKEND,wayland,x11,*
env = NIXOS_OZONE_WL,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = XCURSOR_SIZE,24

input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle

    repeat_delay = 240
    repeat_rate = 38
    numlock_by_default = true

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2

    col.active_border = rgba(9d4eddff) rgba(c77dffff) rgba(7b2cbfff) 45deg
    col.inactive_border = rgba(312244aa) rgba(10002baa) 45deg

    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 14
    active_opacity = 0.96
    inactive_opacity = 0.90
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(7b2cbf55)
        color_inactive = rgba(00000022)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.0117
        contrast = 1.05
        brightness = 0.88
        vibrancy = 0.18
        new_optimizations = true
        ignore_opacity = true
    }
}

animations {
    enabled = true

    bezier = futureEase, 0.05, 0.70, 0.10, 1.00
    bezier = smoothOut, 0.16, 1.00, 0.30, 1.00
    bezier = quickIn, 0.50, 0.00, 0.75, 0.00

    animation = windows, 1, 4, futureEase, popin 82%
    animation = windowsOut, 1, 3, quickIn, popin 82%
    animation = border, 1, 10, default
    animation = fade, 1, 4, futureEase
    animation = layers, 1, 4, futureEase, fade
    animation = workspaces, 1, 4, smoothOut, slide
    animation = specialWorkspace, 1, 4, futureEase, slidefade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_focuses_monitor = true
    vrr = 2
}

# Blur for shell layers
layerrule = blur, waybar
layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = blur, notifications

# Window rules
windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = size 900 620, class:^(pavucontrol)$
windowrulev2 = float, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = center, class:^(org.kde.polkit-kde-authentication-agent-1)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = keepaspectratio, title:^(Picture-in-Picture)$
windowrulev2 = opacity 0.92 0.84, class:^(kitty)$
windowrulev2 = opacity 0.94 0.88, class:^(org.kde.dolphin)$
windowrulev2 = opacity 0.92 0.86, class:^(discord)$
windowrulev2 = opacity 0.94 0.90, class:^(heroic|lutris|steam)$
windowrulev2 = suppressevent maximize, class:.*

# Apps
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, Space, exec, $menu
bind = $mainMod, D, exec, $menu
bind = $mainMod, R, exec, $runMenu
bind = $mainMod, Tab, exec, $windowMenu
bind = $mainMod, P, exec, pavucontrol

# Session / shell
bind = $mainMod SHIFT, R, exec, sh -c 'hyprctl reload; pkill waybar; waybar &'
bind = $mainMod SHIFT, E, exit

# Window actions
bind = $mainMod, Q, killactive
bind = ALT, F4, killactive
bind = $mainMod, W, togglefloating
bind = $mainMod, F, fullscreen
bind = $mainMod, G, togglegroup
bind = $mainMod SHIFT, G, changegroupactive, f
bind = $mainMod, A, togglesplit
bind = $mainMod, M, pseudo

# Move / resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Resize windows
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30
binde = $mainMod CTRL, L, resizeactive, 30 0
binde = $mainMod CTRL, H, resizeactive, -30 0
binde = $mainMod CTRL, K, resizeactive, 0 -30
binde = $mainMod CTRL, J, resizeactive, 0 30

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Special workspace
bind = $mainMod, S, togglespecialworkspace, scratch
bind = $mainMod SHIFT, S, movetoworkspacesilent, special:scratch

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%F-%H-%M-%S).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | swappy -f -

# Audio / brightness
binde = , XF86AudioRaiseVolume, exec, pamixer -i 3
binde = , XF86AudioLowerVolume, exec, pamixer -d 3
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioMicMute, exec, pamixer --default-source -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Night mode
bind = $mainMod, F9, exec, hyprsunset --temperature 2500
bind = $mainMod, F10, exec, pkill hyprsunset

# Color picker
bind = $mainMod CTRL, C, exec, hyprpicker --autocopy --format=hex

# Clipboard history
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/purple-neon.rasi | cliphist decode | wl-copy
