# =========================
# Hyprland — personal purple neon desktop
# =========================
# Цель: обычный удобный рабочий стол, похожий по логике на KDE,
# но с нижним доком в стиле macOS.

monitor=,preferred,auto,1

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun

# Autostart
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
exec-once = polkit-kde-authentication-agent-1
exec-once = nm-applet --indicator
exec-once = waybar
exec-once = mako
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Environment
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GDK_BACKEND,wayland,x11,*
env = NIXOS_OZONE_WL,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = MOZ_ENABLE_WAYLAND,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,kde
env = XDG_MENU_PREFIX,plasma-
env = XCURSOR_SIZE,24

# NVIDIA / Wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia

input {
    kb_layout = us,ru
    kb_options = grp:alt_shift_toggle

    repeat_delay = 260
    repeat_rate = 35
    numlock_by_default = true

    follow_mouse = 1
    sensitivity = 0
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2

    col.active_border = rgba(b967ffff) rgba(ff4fd8ff) 45deg
    col.inactive_border = rgba(2b203acc)

    resize_on_border = true
    layout = dwindle
}

dwindle {
    preserve_split = true
}

decoration {
    rounding = 12

    shadow {
        enabled = false
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
    }
}

animations {
    enabled = true

    bezier = neonDecel, 0.05, 0.7, 0.1, 1
    bezier = neonOut, 0.16, 1, 0.3, 1

    animation = windows, 1, 3, neonDecel, popin 65%
    animation = windowsOut, 1, 3, neonDecel
    animation = border, 1, 10, default
    animation = fade, 1, 3, neonDecel
    animation = workspaces, 1, 4, neonOut, slide
    animation = specialWorkspace, 1, 3, neonDecel, slidefade
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_focuses_monitor = true
    vrr = 2
}

# Window rules
windowrule = match:title ^(Open File)(.*)$, float on
windowrule = match:title ^(Open File)(.*)$, center on
windowrule = match:title ^(Select a File)(.*)$, float on
windowrule = match:title ^(Select a File)(.*)$, center on
windowrule = match:title ^(Save As)(.*)$, float on
windowrule = match:title ^(Save As)(.*)$, center on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(pavucontrol)$, center on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float on
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, center on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, float on
windowrule = match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$, pin on

windowrule = match:class ^(discord)$, opacity 0.92 0.86
windowrule = match:class ^(heroic)$, opacity 0.94 0.88
windowrule = match:class ^(lutris)$, opacity 0.94 0.88
windowrule = match:class ^(org.kde.dolphin)$, opacity 0.96 0.92
windowrule = match:class ^(kitty)$, opacity 0.92 0.84

# Apps
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Space, exec, $menu
bind = $mainMod, D, exec, $menu
bind = $mainMod, F, exec, firefox
bind = $mainMod, K, exec, kate
bind = $mainMod, P, exec, pavucontrol
bind = $mainMod, A, exec, ayugram-desktop
bind = $mainMod, C, exec, discord

# Window actions
bind = $mainMod, Q, killactive
bind = ALT, F4, killactive
bind = $mainMod, W, togglefloating
bind = $mainMod SHIFT, F, fullscreen
bind = ALT, Return, fullscreen
bind = $mainMod SHIFT, M, exit

# Move / resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Resize windows
binde = $mainMod CTRL, right, resizeactive, 30 0
binde = $mainMod CTRL, left, resizeactive, -30 0
binde = $mainMod CTRL, up, resizeactive, 0 -30
binde = $mainMod CTRL, down, resizeactive, 0 30

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace
bind = $mainMod, S, togglespecialworkspace, scratch
bind = $mainMod SHIFT, S, movetoworkspace, special:scratch

# Screenshots
bind = , Print, exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" ~/Pictures/Screenshots/screenshot-$(date +%F-%H-%M-%S).png
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, Print, exec, grim -g "$(slurp)" - | swappy -f -

# Audio
binde = , XF86AudioRaiseVolume, exec, pamixer -i 2
binde = , XF86AudioLowerVolume, exec, pamixer -d 2
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Night mode
bind = $mainMod, F9, exec, hyprsunset --temperature 2500
bind = $mainMod, F10, exec, pkill hyprsunset

# Color picker
bind = $mainMod CTRL, C, exec, hyprpicker --autocopy --format=hex

# Clipboard history
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
